<!DOCTYPE html>
<html lang="en">

<head>
    <!-- Required meta tags -->
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">
    <meta property="og:title" content="Personal Portfolio">
    <meta property="og:description" content="My Educational Experience">

    <link rel="preconnect" href="https://fonts.gstatic.com">
    <link
        href="https://fonts.googleapis.com/css2?family=Roboto:ital,wght@0,100;0,300;0,400;0,500;0,700;0,900;1,100;1,300;1,400;1,500;1,700;1,900&display=swap"
        rel="stylesheet">

    <link lang='sass' rel="stylesheet" href="../static/styles/main.css">
    <link lang='sass' rel="stylesheet" href="../static/styles/education.css">
    <link rel='icon' href='../static/img/favicon.ico' type='image/x-icon' />
    <title>{{ title }}</title>
</head>

<body>
    {% include "nav.html" %}

    <div class="edu-header">
        <h1 class="edu-header-title">{{ title }}</h1>
        <p class="edu-header-subtitle">My academic journey</p>
    </div>

    <main class="edu-grid">
        {% for entry in entries %}
        <div class="edu-card">
            <div class="edu-icon">🎓</div>
            <div class="edu-body">
                <h3 class="edu-school">{{ entry.school }}</h3>
                <p class="edu-degree">{{ entry.degree }}</p>
                <span class="edu-dates">{{ entry.dates }}</span>
                <p class="edu-desc">{{ entry.description }}</p>
            </div>
        </div>
        {% endfor %}
    </main>

    <footer class="pg-foot" style="text-align:center;">
        <p style="margin:0; color:rgba(255,255,255,0.55); font-size:13px;">
            &copy; 2024 My Portfolio &mdash; Built with Flask
        </p>
    </footer>
</body>
</html>
